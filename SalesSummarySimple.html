<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="fb_path" content="CloudPages:Demos/SalesSummarySimple">
    <meta name="fb_modules" content="*">
    <meta name="fb_title" content="Sales Summary">
    <meta name="fb_description" content="Sales orders by customer and date range">
    <meta name="window_state" content="maximized">
    <title>Sales Summary</title>

    <!-- Local styles -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="css/cloudpages.css">
    <link rel="stylesheet" href="css/driver.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">CloudPages Demos</a>
            <span class="navbar-text text-light">Sales Summary</span>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div id="parametersContainer" class="mb-3"></div>
        <div class="mb-3">
            <button id="submitButton" class="btn btn-primary">Run Report</button>
            <button id="exportBtn" class="btn btn-outline-secondary">Export</button>
        </div>
        <div id="tableContainer"></div>
    </div>

    <!-- Local scripts -->
    <script src="js/jquery.min.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/dataTables.bootstrap5.min.js"></script>
    <script src="js/xlsx.full.min.js"></script>
    <script src="js/fb.js"></script>

    <!-- Demo mode configuration — runs before cloudpages.js initializes -->
    <script>
        FB.configure({
            environment: 'demo',
            demoData: {
                queries: {
                    // Matched via script tag id="customerQuery"
                    "customerQuery": [
                        { id: 1, name: "ABC Manufacturing" },
                        { id: 2, name: "XYZ Distribution" },
                        { id: 3, name: "Acme Industrial" },
                        { id: 4, name: "Pinnacle Supply Co." }
                    ],
                    // Matched via script tag id="query"
                    "query": [
                        { so_num: "50001", customer_name: "ABC Manufacturing",  date_issued: "2025-01-08", total_price: 4250.00, product_num: "WIDGET-A",  qty_fulfilled: 10 },
                        { so_num: "50002", customer_name: "ABC Manufacturing",  date_issued: "2025-01-22", total_price: 875.50,  product_num: "WIDGET-B",  qty_fulfilled: 3  },
                        { so_num: "50003", customer_name: "ABC Manufacturing",  date_issued: "2025-02-14", total_price: 3100.00, product_num: "WIDGET-A",  qty_fulfilled: 7  },
                        { so_num: "50004", customer_name: "XYZ Distribution",   date_issued: "2025-01-30", total_price: 1540.25, product_num: "GADGET-X",  qty_fulfilled: 5  },
                        { so_num: "50005", customer_name: "XYZ Distribution",   date_issued: "2025-02-20", total_price: 6800.00, product_num: "GADGET-Y",  qty_fulfilled: 20 },
                        { so_num: "50006", customer_name: "Acme Industrial",    date_issued: "2025-03-05", total_price: 990.00,  product_num: "PART-001",  qty_fulfilled: 2  },
                        { so_num: "50007", customer_name: "Pinnacle Supply Co.",date_issued: "2025-03-11", total_price: 12500.00,"product_num": "PART-002", qty_fulfilled: 50 }
                    ]
                },
                user: {
                    companyName: "Acme Manufacturing",
                    username: "jsmith",
                    email: "jsmith@acme.com",
                    userId: 1,
                    groups: ["1"]
                }
            }
        });
    </script>

    <script src="js/driver.js.iife.js"></script>
    <script src="js/cloudpages.js"></script>

    <!-- Demo pre-fill — populates fields after cloudpages async init completes -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (FB.environment !== 'demo') return;
            // setTimeout(0) runs after the Promise microtasks that load dropdown options
            setTimeout(function () {
                var customerSelect = document.getElementById('customer');
                if (customerSelect) customerSelect.value = '1';

                var dateStart = document.getElementById('date_issued_start');
                var dateEnd   = document.getElementById('date_issued_end');
                if (dateStart) dateStart.value = '2025-01-01';
                if (dateEnd)   dateEnd.value   = '2025-12-31';

                document.getElementById('submitButton').click();
            }, 0);
        });
    </script>

    <!-- Demo tour — only runs when viewed on the web in demo mode -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (FB.environment !== 'demo') return;

            var driverObj = window.driver.js.driver({
                showProgress: true,
                allowClose: true,
                steps: [
                    {
                        popover: {
                            title: 'Welcome to the Sales Summary Demo',
                            description: 'This page shows how a CloudPages report works. Follow the steps to run your first report — it\'s pre-loaded with sample data so nothing is required.',
                            side: 'over'
                        }
                    },
                    {
                        element: '#parametersContainer',
                        popover: {
                            title: 'Step 1 — Choose a Customer',
                            description: 'Select a customer from the dropdown. In demo mode these options are pre-populated with sample data.',
                            side: 'bottom',
                            align: 'start'
                        }
                    },
                    {
                        element: '#parametersContainer',
                        popover: {
                            title: 'Step 2 — Set a Date Range',
                            description: 'Pick a start and end date for the report. Try 2025-01-01 through 2025-12-31 to see all sample orders.',
                            side: 'bottom',
                            align: 'start'
                        }
                    },
                    {
                        element: '#submitButton',
                        popover: {
                            title: 'Step 3 — Run the Report',
                            description: 'Click Run Report to execute the query. Results will load in the table below.',
                            side: 'bottom',
                            align: 'start'
                        }
                    },
                    {
                        element: '#exportBtn',
                        popover: {
                            title: 'Export',
                            description: 'After the results load, click Export to download as XLSX or CSV.',
                            side: 'bottom',
                            align: 'start'
                        }
                    },
                    {
                        element: '#tableContainer',
                        popover: {
                            title: 'Results Table',
                            description: 'Results appear here with sorting, search, and pagination built in. Give it a try!',
                            side: 'top',
                            align: 'start'
                        }
                    }
                ]
            });

            driverObj.drive();
        });
    </script>

    <!-- CloudPages declarative config -->

    <script id="settings" type="application/json">
    {
        "load_on_open": false,
        "page_length": 25,
        "enable_xlsx_export": true,
        "enable_csv_export": true,
        "amount_unit_format": "$0.00",
        "qty_unit_format": "0.##"
    }
    </script>

    <!-- Named SQL for customer dropdown — id used as demo data key -->
    <script id="customerQuery" type="text/plain">SELECT id, name FROM customer WHERE activeFlag = 1</script>

    <script id="parameters" type="application/json">
    {
        "customer": {
            "label": "Customer",
            "type": "dropdown",
            "mode": "single",
            "sql": "SELECT id, name FROM customer WHERE activeFlag = 1",
            "value": "id",
            "display": "name",
            "required": true
        },
        "date_issued": {
            "label": "Date Issued",
            "type": "date",
            "mode": "range",
            "required": true
        }
    }
    </script>

    <script id="query" type="text/plain">
    SELECT
        so.num          AS so_num,
        customer.name   AS customer_name,
        so.dateIssued   AS date_issued,
        so.totalPrice   AS total_price,
        soitem.productNum   AS product_num,
        soitem.qtyFulfilled AS qty_fulfilled
    FROM so
        JOIN customer ON customer.id = so.customerId
        JOIN soitem   ON soitem.soId = so.id
    WHERE so.customerId = :customer
        AND DATE(so.dateIssued) BETWEEN :date_issued_start AND :date_issued_end
    ORDER BY so.dateIssued DESC
    </script>

    <script id="columns" type="application/json">
    {
        "so_num":        { "label": "SO #" },
        "customer_name": { "label": "Customer" },
        "date_issued":   { "label": "Date", "format": "date" },
        "total_price":   { "label": "Total", "format": "currency" },
        "product_num":   { "label": "Product" },
        "qty_fulfilled": { "label": "Qty", "format": "number" }
    }
    </script>

</body>
</html>
